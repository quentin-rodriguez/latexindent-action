name: Test

on:
  push:
    branches:
      - master
    pull_request:
      - master

jobs:
  test-passed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./
        with:
          file: test/well-formatted.tex
          config: test/latexindent.yaml

  test-failed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./
        id: badcheck
        continue-on-error: true
        with:
          file: test/badly-formatted.tex
          config: test/latexindent.yaml
      - if: steps.badcheck.outcome != "failure"
        run: |
          echo "The action should have failed on a badly-formatted file!"
          exit 1

